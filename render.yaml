services:
  # ── Backend Service (Python FastAPI) ──
  - type: web
    name: resume-eval-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: |
      pip install -r requirements.txt
      pip install https://github.com/explosion/spacy-models/releases/download/en_core_web_md-3.7.1/en_core_web_md-3.7.1-py3-none-any.whl
    startCommand: alembic upgrade head && python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: resume-eval-db
          property: connectionString
      - key: APP_URL
        value: "https://resume-eval-frontend.onrender.com"
      - key: BACKEND_URL
        value: "https://resume-eval-backend-x213.onrender.com"
      - key: CORS_ORIGINS
        value: "https://resume-eval-frontend.onrender.com"
      - key: MAX_UPLOAD_MB
        value: "20"
      # IMPORTANT: Add your OpenAI/LLM Keys here securely via Render Dashboard, not in code!
      # - key: LLM_API_KEY
      #   sync: false

  # ── Frontend Service (React SPA) ──
  - type: web
    name: resume-eval-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: "https://resume-eval-backend-x213.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

# ── PostgreSQL Database ──
databases:
  - name: resume-eval-db
    region: ohio
    plan: free
    databaseName: resume_eval
    user: resume_user
